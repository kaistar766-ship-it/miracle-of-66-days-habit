<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Miracle of 66 Days Habit</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="profile-picker-screen" class="profile-picker-screen">
    <h1 class="profile-picker-app-title">Miracle of 66 Days Habit</h1>
    <h2 class="profile-picker-title">프로필을 선택하세요</h2>

    <div id="profile-grid" class="profile-grid"></div>

    <form id="add-profile-form" class="add-profile-form" hidden>
      <span id="profile-form-preview" class="profile-form-preview" hidden></span>
      <input type="text" id="profile-name-input" placeholder="이름" autocomplete="off" />
      <input type="file" id="profile-photo-input" accept="image/*" />
      <input type="color" id="profile-color-input" />
      <button type="submit" id="profile-form-submit-btn">추가</button>
      <button type="button" id="add-profile-cancel-btn">취소</button>
    </form>

    <button type="button" id="profile-manage-btn" class="profile-manage-btn">프로필 관리</button>
  </div>

  <div id="app-root" hidden>
    <div id="top-bar" class="top-bar">
      <div class="bgm-player">
        <button type="button" id="bgm-toggle-btn" class="bgm-toggle-btn" aria-label="배경음악 재생">▶</button>
        <input type="range" id="bgm-volume" class="bgm-volume" min="0" max="100" value="30" aria-label="배경음악 볼륨" />
      </div>
      <div id="datetime-weather" class="datetime-weather">
        <span id="datetime-text" class="datetime-text"></span>
        <button type="button" id="weather-text" class="weather-text" aria-label="날씨 보기 (위치 권한 필요)"></button>
      </div>
    </div>

    <header class="app-header">
      <div class="header-titles">
        <h1>Miracle of 66 Days Habit</h1>
        <p id="habit-start-date" class="habit-start-date" tabindex="0" role="button" aria-label="시작일 변경"></p>
        <input type="date" id="start-date-input" class="start-date-input" hidden />
        <p id="daily-quote" class="daily-quote"></p>
      </div>
      <button type="button" id="switch-profile-btn" class="switch-profile-btn">프로필 전환</button>
      <span id="streak-badge" class="streak-badge"></span>
    </header>

    <section id="progress-section" class="progress-section app-section" aria-label="진행률">
    </section>

    <section id="input-section" class="input-section app-section" aria-label="할 일 추가" hidden>
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요" autocomplete="off" />
        <select id="category-select"></select>
        <button type="submit" id="add-btn">+ 추가</button>
      </form>
    </section>

    <section id="category-section" class="category-section app-section" aria-label="카테고리 관리" hidden>
      <p class="category-heading">카테고리 관리</p>
      <div id="category-chip-list" class="category-chip-list"></div>
      <form id="category-form" class="category-form">
        <input type="text" id="category-name-input" placeholder="새 카테고리 이름" autocomplete="off" />
        <input type="color" id="category-color-input" />
        <button type="submit">+ 추가</button>
      </form>
    </section>

    <nav id="filter-tabs" class="filter-tabs app-section" aria-label="카테고리 필터">
      <button type="button" class="filter-tab" data-filter="all">전체</button>
    </nav>

    <main id="todo-list-section" class="app-section" aria-label="할 일 목록">
      <p id="start-date-notice" class="start-date-notice" hidden></p>
      <ul id="todo-list"></ul>
    </main>

    <section id="challenge-section" class="challenge-section app-section" aria-label="연속 달성 챌린지">
    </section>

    <section id="weather-location-section" class="weather-location-section app-section" aria-label="날씨 지역 설정" hidden>
      <p class="weather-location-heading">날씨 지역 설정</p>
      <p id="weather-location-current" class="weather-location-current"></p>
      <form id="weather-location-form" class="weather-location-form">
        <input type="text" id="weather-location-input" placeholder="지역 이름 (예: 청주시)" autocomplete="off" />
        <button type="submit">검색</button>
      </form>
      <div id="weather-location-results" class="weather-location-results" hidden></div>
      <button type="button" id="weather-location-reset-btn" class="weather-location-reset-btn" hidden>자동(내 위치)으로 초기화</button>
    </section>

    <section id="backup-section" class="backup-section app-section" aria-label="데이터 백업" hidden>
      <p class="backup-heading">데이터 백업</p>
      <p class="backup-description">할 일과 챌린지 기록을 파일로 저장하거나, 다른 기기에서 저장한 파일을 불러올 수 있습니다.</p>
      <div class="backup-actions">
        <button type="button" id="export-btn">⬇ 내보내기</button>
        <button type="button" id="import-btn">⬆ 가져오기</button>
        <input type="file" id="import-file-input" accept="application/json,.json" hidden />
      </div>
    </section>

    <section id="settings-actions-section" class="settings-actions-section app-section app-section--last" aria-label="설정 저장/취소" hidden>
      <div class="settings-actions">
        <button type="button" id="challenge-settings-save-btn">저장</button>
        <button type="button" id="challenge-settings-cancel-btn">취소</button>
      </div>
    </section>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
